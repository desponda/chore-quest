global:
  domain: chore-quest.dresponda.com
  environment: production

replicaCount: 1

image:
  repository: ghcr.io/desponda/chore-quest
  tag: sha-631952e
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

ingress:
  enabled: true
  className: cloudflare-tunnel
  host: chore-quest.dresponda.com
  annotations: {}

storage:
  size: "2Gi"

secrets:
  secretName: "chore-quest-secret"
