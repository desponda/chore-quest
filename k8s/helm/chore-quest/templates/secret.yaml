{{- /*
  This template is a placeholder. The actual secret must be created manually in the cluster
  before deploying, or via SealedSecrets. Required keys:
    - database-url: PostgreSQL connection string
    - nextauth-secret: Random string (openssl rand -base64 32)

  Example (create manually):
    kubectl create secret generic chore-quest-secret \
      --namespace chore-quest \
      --from-literal=database-url="postgresql://user:pass@host:5432/chorequest" \
      --from-literal=nextauth-secret="$(openssl rand -base64 32)"
*/ -}}
