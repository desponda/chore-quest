{{- /* Daily backup of the SQLite database file to a timestamped copy within the same PV.
     For off-cluster backup, configure Velero or copy /data/backups off-cluster. */ -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "chore-quest.fullname" . }}-db-backup
  labels:
    app: chore-quest
spec:
  schedule: "0 3 * * *"  # 3 AM daily
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1001
            fsGroup: 1001
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3.19
              command:
                - sh
                - -c
                - |
                  mkdir -p /data/backups
                  cp /data/chorequest.db /data/backups/chorequest-$(date +%Y%m%d-%H%M%S).db
                  # Keep only last 7 backups
                  ls -t /data/backups/chorequest-*.db | tail -n +8 | xargs rm -f 2>/dev/null || true
                  echo "Backup complete."
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ include "chore-quest.fullname" . }}-data
