apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chore-quest.fullname" . }}
  labels:
    app: chore-quest
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicaCount }}
  progressDeadlineSeconds: 600
  # SQLite requires only one writer at a time
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chore-quest
  template:
    metadata:
      labels:
        app: chore-quest
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      imagePullSecrets:
        - name: ghcr-credentials
      initContainers:
        # Run Prisma migrations before the app starts (creates DB on first run)
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              value: "file:/data/chorequest.db"
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "file:/data/chorequest.db"
            - name: NEXTAUTH_URL
              value: "https://{{ .Values.ingress.host }}"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.secretName }}
                  key: nextauth-secret
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "chore-quest.fullname" . }}-data
