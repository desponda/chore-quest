apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chore-quest.fullname" . }}-data
  labels:
    app: chore-quest
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: {{ .Values.storage.size }}
