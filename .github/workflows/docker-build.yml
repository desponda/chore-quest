name: Docker Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            app:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'prisma/**'
              - 'public/**'
              - 'types/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.ts'
              - 'Dockerfile'
      - name: Set manual trigger flag
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: echo "app=true" >> $GITHUB_OUTPUT

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Extract short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: always() && needs.build.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Helm values with new image tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Updating image tag to sha-${SHORT_SHA}"
          awk '/^image:/{found=1} found && /^\s+tag:/{sub(/tag: .*/, "tag: sha-'$SHORT_SHA'"); found=0} 1' \
            k8s/helm/chore-quest/values.yaml > /tmp/values.yaml
          mv /tmp/values.yaml k8s/helm/chore-quest/values.yaml
          git diff k8s/helm/chore-quest/values.yaml || echo "No changes"

      - name: Commit and push updated Helm values
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/helm/chore-quest/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git commit -m "chore: update image tag to sha-${SHORT_SHA}"

          MAX_RETRIES=5
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if git push origin main; then
              echo "Successfully pushed GitOps update"
              exit 0
            fi
            git fetch origin main
            if git rebase origin/main; then
              RETRY_COUNT=$((RETRY_COUNT + 1))
            else
              git rebase --abort
              echo "ERROR: Rebase conflict"
              exit 1
            fi
            sleep 2
          done
          echo "ERROR: Failed to push after $MAX_RETRIES attempts"
          exit 1
