<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="sword-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e2e8f0"/>
      <stop offset="50%"  stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="guard-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#d97706"/>
      <stop offset="50%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Crossed swords -->
  <g filter="url(#glow)">
    <!-- Sword 1 (top-left to bottom-right) -->
    <line x1="10" y1="10" x2="38" y2="38" stroke="url(#sword-grad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Guard 1 -->
    <line x1="16" y1="32" x2="32" y2="16" stroke="url(#guard-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Sword 2 (top-right to bottom-left) -->
    <line x1="38" y1="10" x2="10" y2="38" stroke="url(#sword-grad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Guard 2 -->
    <line x1="16" y1="16" x2="32" y2="32" stroke="url(#guard-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Center gem -->
    <circle cx="24" cy="24" r="4" fill="#7c3aed" stroke="#c4b5fd" stroke-width="1.5"/>
    <circle cx="23" cy="23" r="1.5" fill="rgba(255,255,255,0.5)"/>
  </g>
</svg>
