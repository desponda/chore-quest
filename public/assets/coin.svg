<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="coin-face" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#fef08a"/>
      <stop offset="40%"  stop-color="#facc15"/>
      <stop offset="80%"  stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>
    <radialGradient id="coin-edge" cx="50%" cy="50%" r="50%">
      <stop offset="85%"  stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <filter id="coin-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>
  <!-- Edge/rim -->
  <circle cx="12" cy="13" r="10" fill="url(#coin-edge)" filter="url(#coin-shadow)"/>
  <!-- Face -->
  <circle cx="12" cy="11.5" r="10" fill="url(#coin-face)"/>
  <!-- Star symbol -->
  <text x="12" y="15.5" text-anchor="middle" font-size="9" font-weight="bold" fill="rgba(146,64,14,0.7)" font-family="serif">★</text>
  <!-- Highlight glint -->
  <ellipse cx="9" cy="8" rx="3" ry="2" fill="rgba(255,255,255,0.25)" transform="rotate(-20 9 8)"/>
</svg>
