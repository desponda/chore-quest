<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 48" preserveAspectRatio="none">
  <defs>
    <!-- Main cylinder gradient (top-to-bottom light = convex) -->
    <linearGradient id="rod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a2008"/>
      <stop offset="8%"   stop-color="#7a4010"/>
      <stop offset="22%"  stop-color="#c07828"/>
      <stop offset="38%"  stop-color="#e8b040"/>
      <stop offset="50%"  stop-color="#fad868"/>
      <stop offset="62%"  stop-color="#e0a030"/>
      <stop offset="78%"  stop-color="#b06820"/>
      <stop offset="92%"  stop-color="#784010"/>
      <stop offset="100%" stop-color="#3e1a06"/>
    </linearGradient>
    <!-- Specular highlight streak -->
    <radialGradient id="spec" cx="50%" cy="32%" r="55%">
      <stop offset="0%"  stop-color="rgba(255,240,180,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,220,120,0)"/>
    </radialGradient>
    <!-- End-cap face gradient (sphere shading) -->
    <radialGradient id="cap" cx="38%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#d09030"/>
      <stop offset="45%"  stop-color="#8a5018"/>
      <stop offset="80%"  stop-color="#5a2e08"/>
      <stop offset="100%" stop-color="#3a1806"/>
    </radialGradient>
    <filter id="dropshadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.65)"/>
    </filter>
  </defs>

  <!-- Rod body — slightly squashed ellipse for cylinder perspective -->
  <ellipse cx="210" cy="24" rx="210" ry="20" fill="url(#rod)" filter="url(#dropshadow)"/>
  <!-- Specular highlight on top surface -->
  <ellipse cx="210" cy="18" rx="190" ry="9" fill="url(#spec)"/>

  <!-- Left end-cap sphere -->
  <ellipse cx="18" cy="24" rx="18" ry="20" fill="url(#cap)"/>
  <ellipse cx="14" cy="18" rx="8"  ry="6"  fill="rgba(255,220,140,0.25)"/>

  <!-- Right end-cap sphere -->
  <ellipse cx="402" cy="24" rx="18" ry="20" fill="url(#cap)"/>
  <ellipse cx="398" cy="18" rx="8"  ry="6"  fill="rgba(255,220,140,0.25)"/>

  <!-- Wood grain lines on the rod body -->
  <line x1="30"  y1="8"  x2="390" y2="8"  stroke="rgba(100,50,10,0.12)" stroke-width="1.5"/>
  <line x1="30"  y1="14" x2="390" y2="14" stroke="rgba(80,40,8,0.08)"  stroke-width="1"/>
  <line x1="30"  y1="34" x2="390" y2="34" stroke="rgba(80,40,8,0.08)"  stroke-width="1"/>
  <line x1="30"  y1="40" x2="390" y2="40" stroke="rgba(100,50,10,0.12)" stroke-width="1.5"/>
</svg>
