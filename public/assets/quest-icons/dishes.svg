<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="plate" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="70%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </radialGradient>
    <linearGradient id="steam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Dragon silhouette (dish "dragon") -->
  <path d="M44 14 C50 10 58 12 60 18 C62 24 56 28 52 26 C56 30 58 36 54 40 C50 44 44 40 42 36 L36 40 L32 36 L28 40 L22 44 C18 48 12 46 10 42 C8 38 12 34 16 36 L20 32 L14 28 C10 24 12 18 16 16 C20 14 26 18 28 22 L32 16 L36 22 Z" fill="#dc2626" opacity="0.9"/>
  <path d="M44 14 C50 10 58 12 60 18 C62 24 56 28 52 26" fill="none" stroke="#fca5a5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Steam waves over dish -->
  <path d="M20 50 Q22 46 24 50 Q26 54 28 50" fill="none" stroke="url(#steam)" stroke-width="2" stroke-linecap="round"/>
  <path d="M28 52 Q30 48 32 52 Q34 56 36 52" fill="none" stroke="url(#steam)" stroke-width="2" stroke-linecap="round"/>
  <path d="M36 50 Q38 46 40 50 Q42 54 44 50" fill="none" stroke="url(#steam)" stroke-width="2" stroke-linecap="round"/>
  <!-- Water/soap bubble -->
  <circle cx="48" cy="18" r="5" fill="url(#water)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="49" cy="17" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <!-- Plate -->
  <ellipse cx="32" cy="54" rx="20" ry="6" fill="url(#plate)" stroke="#cbd5e1" stroke-width="1"/>
  <ellipse cx="32" cy="52" rx="16" ry="4" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
</svg>
