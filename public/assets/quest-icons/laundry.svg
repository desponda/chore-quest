<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="basket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="cloth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Basket body -->
  <path d="M14 32 L12 56 L52 56 L50 32 Z" fill="url(#basket)" rx="4"/>
  <!-- Basket weave lines -->
  <line x1="22" y1="32" x2="20" y2="56" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <line x1="30" y1="32" x2="30" y2="56" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <line x1="38" y1="32" x2="40" y2="56" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <line x1="14" y1="40" x2="50" y2="40" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
  <line x1="13" y1="48" x2="51" y2="48" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
  <!-- Basket rim -->
  <rect x="11" y="29" width="42" height="6" rx="3" fill="#b45309"/>
  <!-- Shirt bursting out (the "beast") -->
  <path d="M20 30 L24 20 L28 24 L32 16 L36 24 L40 20 L44 30 Z" fill="url(#shirt)"/>
  <path d="M24 20 L20 24 L20 30" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M40 20 L44 24 L44 30" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cloth strip hanging -->
  <path d="M10 22 Q14 28 10 34 Q6 40 10 46" fill="none" stroke="url(#cloth)" stroke-width="4" stroke-linecap="round"/>
  <!-- Eyes on the "beast" shirt -->
  <circle cx="29" cy="22" r="2" fill="white"/>
  <circle cx="35" cy="22" r="2" fill="white"/>
  <circle cx="29.5" cy="22.5" r="1" fill="#1e1b4b"/>
  <circle cx="35.5" cy="22.5" r="1" fill="#1e1b4b"/>
</svg>
