version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chorequest
      POSTGRES_USER: chorequest
      POSTGRES_PASSWORD: chorequest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chorequest"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://chorequest:chorequest@postgres:5432/chorequest"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
